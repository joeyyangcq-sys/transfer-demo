services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transfers
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      APP_ADDR: ":8080"
      METRICS_ADDR: ":9090"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/transfers?sslmode=disable"
    ports:
      - "8080:8080"
      # Admin port (metrics + probes). In production keep this off the public
      # network; exposed here only for local scraping/inspection.
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
