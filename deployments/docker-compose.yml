services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transfers
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      # The application is fully driven by the mounted configuration file;
      # no per-service environment variables are needed.
      # 应用完全由挂载的配置文件驱动，无需任何运行时环境变量。
      CONFIG_FILE: "/app-config/config.yaml"
    volumes:
      - ./logs:/logs
      - ./config.yaml:/app-config/config.yaml:ro
    ports:
      - "8080:8080"
      # Admin port (metrics + probes). In production keep this off the public
      # network; exposed here only for local scraping/inspection.
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ../api:/spec:ro
    ports:
      - "8081:8080"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090" # host 9091 -> container 9090 (app already uses host 9090)
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Allow viewing dashboards without logging in (local dev only).
      # 本地开发：免登录即可查看仪表盘。
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
